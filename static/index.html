<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>静享时空 · 在线客服</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --primary: #6C5CE7;
    --primary-light: #A29BFE;
    --bg: #F8F9FD;
    --white: #FFFFFF;
    --text: #2D3436;
    --text-light: #B2BEC3;
    --border: #E8ECF0;
    --user-bubble: #6C5CE7;
    --bot-bubble: #FFFFFF;
    --shadow: 0 2px 12px rgba(0,0,0,.06);
}

body {
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
    background: var(--bg); height: 100vh; display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
    background: var(--white); padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border); flex-shrink: 0; position: relative; z-index: 5;
}
.header-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, #6C5CE7, #A29BFE);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: white; flex-shrink: 0;
}
.header-info { flex: 1; }
.header-info h1 { font-size: 16px; font-weight: 600; color: var(--text); }
.header-info .status {
    font-size: 12px; color: #00B894; margin-top: 2px;
    display: flex; align-items: center; gap: 4px;
}
.header-info .status::before {
    content: ''; width: 6px; height: 6px; background: #00B894;
    border-radius: 50%; display: inline-block;
}

/* Chat area */
.chat-area {
    flex: 1; overflow-y: auto; padding: 20px 16px; display: flex;
    flex-direction: column; gap: 16px;
    -webkit-overflow-scrolling: touch;
}

/* Messages */
.msg-row { display: flex; gap: 10px; max-width: 82%; animation: slideUp .3s ease; }
.msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-row.bot { align-self: flex-start; }

.msg-avatar {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.msg-row.bot .msg-avatar {
    background: linear-gradient(135deg, #6C5CE7, #A29BFE); color: white;
}
.msg-row.user .msg-avatar { background: #DFE6E9; font-size: 15px; }

.msg-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }

.msg-bubble {
    padding: 12px 16px; font-size: 14px; line-height: 1.7;
    word-break: break-word; white-space: pre-wrap;
    border-radius: 18px;
}
.msg-row.bot .msg-bubble {
    background: var(--white); color: var(--text);
    border-bottom-left-radius: 6px;
    box-shadow: var(--shadow);
}
.msg-row.user .msg-bubble {
    background: var(--user-bubble); color: white;
    border-bottom-right-radius: 6px;
}
.msg-bubble strong { font-weight: 600; }

.msg-meta {
    display: flex; align-items: center; gap: 8px;
    padding: 0 4px;
}
.msg-row.user .msg-meta { justify-content: flex-end; }

.msg-time { font-size: 11px; color: var(--text-light); }

.msg-feedback { display: flex; gap: 4px; }
.fb-btn {
    background: none; border: none; font-size: 15px; cursor: pointer;
    opacity: .4; transition: all .2s; padding: 2px;
}
.fb-btn:hover { opacity: .8; transform: scale(1.2); }
.fb-btn.voted { opacity: 1; transform: scale(1.1); }

.human-notice {
    font-size: 12px; color: #E17055; background: #FFF5F5;
    padding: 4px 10px; border-radius: 10px; display: inline-block;
}

/* Typing indicator */
.typing-dots { display: flex; gap: 5px; padding: 6px 4px; }
.typing-dots span {
    width: 7px; height: 7px; background: var(--primary-light); border-radius: 50%;
    animation: typingBounce .5s infinite alternate;
}
.typing-dots span:nth-child(2) { animation-delay: .15s; }
.typing-dots span:nth-child(3) { animation-delay: .3s; }

/* Quick replies */
.quick-replies {
    display: flex; gap: 8px; flex-wrap: wrap; padding: 6px 16px 10px;
    animation: slideUp .3s ease;
}
.qr-btn {
    background: var(--white); border: 1px solid var(--border); border-radius: 20px;
    padding: 8px 16px; font-size: 13px; color: var(--primary); cursor: pointer;
    transition: all .2s; box-shadow: 0 1px 4px rgba(0,0,0,.04);
    white-space: nowrap;
}
.qr-btn:hover { border-color: var(--primary); background: #F8F7FF; transform: translateY(-1px); }
.qr-btn:active { transform: translateY(0); }

/* Input */
.input-bar {
    background: var(--white); padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center; flex-shrink: 0;
}
.input-bar input {
    flex: 1; border: 1.5px solid var(--border); border-radius: 22px;
    padding: 11px 18px; font-size: 14px; outline: none;
    transition: border-color .2s; background: var(--bg);
}
.input-bar input:focus { border-color: var(--primary); background: var(--white); }
.input-bar input::placeholder { color: #CED4DA; }
.img-btn {
    width: 38px; height: 38px; border-radius: 50%; border: none;
    background: none; color: var(--text-light); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color .2s; flex-shrink: 0;
}
.img-btn:hover { color: var(--primary); }

.msg-img {
    max-width: 220px; max-height: 220px; border-radius: 12px;
    cursor: pointer; transition: transform .2s;
}
.msg-img:hover { transform: scale(1.03); }

/* 图片预览遮罩 */
.img-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.85); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    cursor: zoom-out;
}
.img-overlay img { max-width: 90%; max-height: 90%; border-radius: 8px; }

.send-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #6C5CE7, #A29BFE);
    color: white; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, opacity .15s; flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.05); }
.send-btn:active { transform: scale(.95); }
.send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* Scroll to bottom */
.scroll-fab {
    position: fixed; bottom: 80px; right: 16px;
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: var(--white); color: var(--primary);
    box-shadow: 0 2px 10px rgba(0,0,0,.12); font-size: 16px;
    cursor: pointer; display: none; z-index: 10;
    transition: transform .2s;
}
.scroll-fab:hover { transform: scale(1.1); }

/* Animations */
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes typingBounce { to { transform: translateY(-8px); opacity: .5; } }

/* Mobile */
@media (max-width: 640px) {
    .msg-row { max-width: 88%; }
    .quick-replies { padding: 6px 12px 8px; }
    .qr-btn { padding: 7px 12px; font-size: 12px; }
    .input-bar { padding: 10px 12px; }
    .header { padding: 12px 16px; }
}

/* Safe area for iOS */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
    .input-bar { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>

<div class="header">
    <div class="header-avatar">🎤</div>
    <div class="header-info">
        <h1>静享时空</h1>
        <div class="status">在线 · 24小时服务</div>
    </div>
</div>

<div class="chat-area" id="chatArea">
    <div class="msg-row bot" id="greetingRow">
        <div class="msg-avatar">🎵</div>
        <div class="msg-body">
            <div class="msg-bubble" id="greetingText">你好！有什么可以帮到你？</div>
        </div>
    </div>
</div>

<div id="quickReplies" class="quick-replies">
    <button class="qr-btn" onclick="ask('包厢价格')">💰 包厢价格</button>
    <button class="qr-btn" onclick="ask('怎么预约')">📱 怎么预约</button>
    <button class="qr-btn" onclick="ask('会员优惠')">🎁 会员优惠</button>
    <button class="qr-btn" onclick="ask('第一次来怎么用')">🆕 新手指南</button>
    <button class="qr-btn" onclick="ask('店在哪里')">📍 门店位置</button>
    <button class="qr-btn" onclick="ask('3个人选什么包厢')">👥 推荐房型</button>
</div>

<button class="scroll-fab" id="scrollFab" onclick="toBottom()">↓</button>

<input type="file" id="imgPicker" accept="image/*" style="display:none" onchange="uploadImg(this)">

<div class="input-bar">
    <button class="img-btn" onclick="document.getElementById('imgPicker').click()" title="发送图片">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <input type="text" id="msgInput" placeholder="请输入您的问题..." onkeydown="if(event.key==='Enter')send()">
    <button class="send-btn" id="sendBtn" onclick="send()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
</div>

<script>
const area = document.getElementById('chatArea');
const qr = document.getElementById('quickReplies');
const inp = document.getElementById('msgInput');
const btn = document.getElementById('sendBtn');
const fab = document.getElementById('scrollFab');
const sid = 'w_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);

function toBottom() { area.scrollTop = area.scrollHeight; }

function addMsg(role, text, meta) {
    const row = document.createElement('div');
    row.className = `msg-row ${role === 'user' ? 'user' : 'bot'}`;
    const avatar = role === 'user' ? '😊' : '🎵';
    const t = new Date();
    const time = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
    const mid = meta?.message_id || 0;

    let metaHtml = `<span class="msg-time">${time}</span>`;
    if (role !== 'user' && meta) {
        metaHtml += `<span class="msg-feedback">
            <button class="fb-btn" onclick="fb(this,1,${mid})">👍</button>
            <button class="fb-btn" onclick="fb(this,-1,${mid})">👎</button>
        </span>`;
        if (meta.need_human) {
            metaHtml += `<span class="human-notice">已转人工处理</span>`;
        }
    }

    row.innerHTML = `
        <div class="msg-avatar">${avatar}</div>
        <div class="msg-body">
            <div class="msg-bubble">${fmt(text)}</div>
            <div class="msg-meta">${metaHtml}</div>
        </div>`;
    area.appendChild(row);
    toBottom();
}

function fmt(s) {
    const d = document.createElement('div');
    d.textContent = s;
    let h = d.innerHTML;
    h = h.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // [img:/static/images/xxx.png] → 可点击的图片
    h = h.replace(/\[img:(\/[^\]]+)\]/g, '<img class="msg-img" src="$1" onclick="previewImg(this.src)">');
    return h;
}

function showTyping() {
    const el = document.createElement('div');
    el.className = 'msg-row bot'; el.id = 'typingRow';
    el.innerHTML = `<div class="msg-avatar">🎵</div><div class="msg-body"><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
    area.appendChild(el); toBottom();
}
function hideTyping() { document.getElementById('typingRow')?.remove(); }

function setQuickReplies(list) {
    if (!list?.length) { qr.innerHTML = ''; return; }
    qr.innerHTML = list.map(s => {
        const safe = s.replace(/'/g, "\\'").replace(/\n/g, ' ');
        return `<button class="qr-btn" onclick="ask('${safe}')">${fmt(s)}</button>`;
    }).join('');
}

async function send() {
    const msg = inp.value.trim();
    if (!msg) return;
    inp.value = '';
    btn.disabled = true;
    qr.innerHTML = '';
    addMsg('user', msg);

    // 创建空的 bot 消息行，流式填充
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    const t = new Date();
    const timeStr = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
    row.innerHTML = `
        <div class="msg-avatar">🎵</div>
        <div class="msg-body">
            <div class="msg-bubble" id="streamBubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
            <div class="msg-meta"><span class="msg-time">${timeStr}</span></div>
        </div>`;
    area.appendChild(row);
    toBottom();

    const bubble = document.getElementById('streamBubble');
    let fullText = '';

    try {
        const r = await fetch('/chat/stream', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: msg, session_id: sid}),
        });
        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const {done, value} = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, {stream: true});

            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const payload = line.slice(6).trim();
                if (payload === '[DONE]') continue;

                try {
                    const d = JSON.parse(payload);
                    if (d.type === 'faq') {
                        // FAQ 秒回
                        fullText = d.reply;
                        bubble.innerHTML = fmt(fullText);
                        toBottom();
                        setQuickReplies(d.suggestions);
                        if (d.need_human) {
                            row.querySelector('.msg-meta').insertAdjacentHTML('beforeend',
                                '<span class="human-notice">已转人工处理</span>');
                        }
                    } else if (d.type === 'chunk') {
                        // 逐字输出
                        fullText += d.content;
                        bubble.innerHTML = fmt(fullText);
                        toBottom();
                    } else if (d.type === 'done') {
                        // 完成，用最终文本替换（去掉 suggestions 分隔符）
                        fullText = d.reply;
                        bubble.innerHTML = fmt(fullText);
                        setQuickReplies(d.suggestions);
                        if (d.need_human) {
                            row.querySelector('.msg-meta').insertAdjacentHTML('beforeend',
                                '<span class="human-notice">已转人工处理</span>');
                        }
                        // 加反馈按钮
                        row.querySelector('.msg-meta').insertAdjacentHTML('afterbegin',
                            `<span class="msg-feedback">
                                <button class="fb-btn" onclick="fb(this,1,0)">👍</button>
                                <button class="fb-btn" onclick="fb(this,-1,0)">👎</button>
                            </span>`);
                    }
                } catch(e) {}
            }
        }
    } catch(e) {
        bubble.innerHTML = '抱歉，网络出了点问题，请稍后再试~';
    }

    bubble.removeAttribute('id');
    btn.disabled = false;
    inp.focus();
}

function ask(text) { inp.value = text; send(); }

// 图片上传
async function uploadImg(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = '';

    if (file.size > 5 * 1024 * 1024) {
        addMsg('bot', '图片不能超过 5MB 哦~');
        return;
    }

    // 先显示图片消息
    addImgMsg('user', URL.createObjectURL(file));

    const form = new FormData();
    form.append('file', file);
    form.append('session_id', sid);

    try {
        const r = await fetch('/upload', {method: 'POST', body: form});
        const d = await r.json();
        if (d.error) {
            addMsg('bot', d.error);
            return;
        }
        // AI 回复"收到图片"
        addMsg('bot', '收到你的图片了~ 📷 如果是设备故障，请描述一下具体问题，我帮你处理！');
        setQuickReplies(['话筒没声音', '空调不制冷', '门打不开', '其他问题']);
    } catch(e) {
        addMsg('bot', '图片上传失败，请稍后重试~');
    }
}

function addImgMsg(role, src) {
    const row = document.createElement('div');
    row.className = `msg-row ${role === 'user' ? 'user' : 'bot'}`;
    const avatar = role === 'user' ? '😊' : '🎵';
    const t = new Date();
    const time = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
    row.innerHTML = `
        <div class="msg-avatar">${avatar}</div>
        <div class="msg-body">
            <img class="msg-img" src="${src}" onclick="previewImg(this.src)">
            <div class="msg-meta"><span class="msg-time">${time}</span></div>
        </div>`;
    area.appendChild(row);
    toBottom();
}

function previewImg(src) {
    const overlay = document.createElement('div');
    overlay.className = 'img-overlay';
    overlay.onclick = () => overlay.remove();
    overlay.innerHTML = `<img src="${src}">`;
    document.body.appendChild(overlay);
}

async function fb(el, rating, mid) {
    el.parentElement.querySelectorAll('.fb-btn').forEach(b => b.classList.remove('voted'));
    el.classList.add('voted');
    try {
        await fetch('/api/feedback', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({session_id: sid, message_id: mid, rating}),
        });
    } catch(e) {}
}

// 滚动检测
area.addEventListener('scroll', () => {
    fab.style.display = (area.scrollHeight - area.scrollTop - area.clientHeight > 150) ? 'block' : 'none';
});

// 欢迎语
(async () => {
    try {
        const r = await fetch('/api/greeting?session_id=' + encodeURIComponent(sid));
        const d = await r.json();
        document.getElementById('greetingText').textContent = d.greeting;
    } catch(e) {
        document.getElementById('greetingText').textContent = '你好！我是静享时空的小助手，有什么可以帮到你？';
    }
})();

inp.focus();
</script>
</body>
</html>
