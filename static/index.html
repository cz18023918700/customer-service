<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>静享时空 · AI 客服</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }

.header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white; padding: 16px 20px; text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.header h1 { font-size: 18px; font-weight: 600; }
.header p { font-size: 12px; opacity: .8; margin-top: 4px; }

.chat-container {
    flex: 1; overflow-y: auto; padding: 16px; display: flex;
    flex-direction: column; gap: 12px; max-width: 800px;
    width: 100%; margin: 0 auto;
}

.message {
    display: flex; gap: 10px; max-width: 85%;
    animation: fadeIn .3s ease;
}
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.assistant { align-self: flex-start; }

.avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
}
.message.user .avatar { background: #667eea; color: white; }
.message.assistant .avatar { background: #fff; border: 1px solid #e0e0e0; }

.bubble {
    padding: 10px 14px; border-radius: 16px; font-size: 14px;
    line-height: 1.6; word-break: break-word; white-space: pre-wrap;
}
.message.user .bubble {
    background: #667eea; color: white; border-bottom-right-radius: 4px;
}
.message.assistant .bubble {
    background: white; color: #333; border-bottom-left-radius: 4px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.meta { font-size: 11px; color: #999; margin-top: 4px; text-align: right; }
.meta.human-tag { color: #e74c3c; }

.input-area {
    background: white; padding: 12px 16px; border-top: 1px solid #e8e8e8;
    display: flex; gap: 10px; max-width: 800px; width: 100%; margin: 0 auto;
}
.input-area input {
    flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 16px;
    font-size: 14px; outline: none; transition: border-color .2s;
}
.input-area input:focus { border-color: #667eea; }
.input-area button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 20px; padding: 10px 24px;
    font-size: 14px; cursor: pointer; transition: opacity .2s;
}
.input-area button:hover { opacity: .9; }
.input-area button:disabled { opacity: .5; cursor: not-allowed; }

.typing { display: flex; gap: 4px; padding: 4px 0; }
.typing span {
    width: 6px; height: 6px; background: #999; border-radius: 50%;
    animation: bounce .6s infinite alternate;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }

.quick-actions {
    display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 16px;
    max-width: 800px; width: 100%; margin: 0 auto;
}
.quick-btn {
    background: white; border: 1px solid #e0e0e0; border-radius: 16px;
    padding: 6px 14px; font-size: 12px; color: #666; cursor: pointer;
    transition: all .2s;
}
.quick-btn:hover { border-color: #667eea; color: #667eea; background: #f8f7ff; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounce { to { transform: translateY(-6px); } }
</style>
</head>
<body>

<div class="header">
    <h1>🎤 静享时空 · AI 客服</h1>
    <p>24小时在线，有什么可以帮到你？</p>
</div>

<div class="chat-container" id="chatContainer">
    <div class="message assistant">
        <div class="avatar">🎵</div>
        <div>
            <div class="bubble">你好呀！我是静享时空的小助手「小享」~ 😊
有什么想了解的？比如包厢价格、怎么预约、会员福利什么的，随时问我！</div>
        </div>
    </div>
</div>

<div class="quick-actions">
    <button class="quick-btn" onclick="sendQuick('大包厢晚上多少钱？')">💰 包厢价格</button>
    <button class="quick-btn" onclick="sendQuick('怎么预约包厢？')">📱 怎么预约</button>
    <button class="quick-btn" onclick="sendQuick('有什么会员优惠？')">🎁 会员福利</button>
    <button class="quick-btn" onclick="sendQuick('第一次来，怎么使用？')">🆕 新手指南</button>
    <button class="quick-btn" onclick="sendQuick('店在哪里？怎么去？')">📍 位置导航</button>
    <button class="quick-btn" onclick="sendQuick('3个人适合什么包厢？')">👥 推荐房型</button>
</div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button id="sendBtn" onclick="sendMsg()">发送</button>
</div>

<script>
const container = document.getElementById('chatContainer');
const input = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
let sessionId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);

function addMessage(role, content, meta) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatar = role === 'user' ? '😊' : '🎵';
    let metaHtml = '';
    if (meta) {
        if (meta.need_human) metaHtml = '<div class="meta human-tag">⚠️ 已通知人工客服</div>';
        else if (meta.confidence) metaHtml = `<div class="meta">置信度: ${(meta.confidence * 100).toFixed(0)}%</div>`;
    }
    div.innerHTML = `
        <div class="avatar">${avatar}</div>
        <div>
            <div class="bubble">${escapeHtml(content)}</div>
            ${metaHtml}
        </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

function addTyping() {
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing';
    div.innerHTML = `
        <div class="avatar">🎵</div>
        <div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

async function sendMsg() {
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    sendBtn.disabled = true;

    addMessage('user', msg);
    addTyping();

    try {
        const resp = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, session_id: sessionId }),
        });
        const data = await resp.json();
        removeTyping();
        addMessage('assistant', data.reply, {
            need_human: data.need_human,
            confidence: data.confidence,
        });
    } catch (e) {
        removeTyping();
        addMessage('assistant', '网络出了点问题，请稍后再试 🙏');
    }
    sendBtn.disabled = false;
    input.focus();
}

function sendQuick(text) {
    input.value = text;
    sendMsg();
}

input.focus();
</script>
</body>
</html>
