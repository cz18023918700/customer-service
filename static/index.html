<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>静享时空 · AI 客服</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }

.header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white; padding: 14px 20px; text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.15); flex-shrink: 0;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header p { font-size: 12px; opacity: .8; margin-top: 4px; }
.header a { color: rgba(255,255,255,.7); font-size: 11px; text-decoration: none; position: absolute; right: 16px; top: 16px; }

.chat-container {
    flex: 1; overflow-y: auto; padding: 16px; display: flex;
    flex-direction: column; gap: 12px; max-width: 800px;
    width: 100%; margin: 0 auto;
}

.message { display: flex; gap: 10px; max-width: 85%; animation: fadeIn .3s ease; }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.assistant { align-self: flex-start; }

.avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
}
.message.user .avatar { background: #667eea; color: white; }
.message.assistant .avatar { background: #fff; border: 1px solid #e0e0e0; }

.bubble {
    padding: 10px 14px; border-radius: 16px; font-size: 14px;
    line-height: 1.6; word-break: break-word; white-space: pre-wrap;
}
.message.user .bubble { background: #667eea; color: white; border-bottom-right-radius: 4px; }
.message.assistant .bubble {
    background: white; color: #333; border-bottom-left-radius: 4px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.bubble strong { font-weight: 600; }

.msg-footer { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.feedback-btn {
    background: none; border: 1px solid #ddd; border-radius: 12px; padding: 2px 10px;
    font-size: 14px; cursor: pointer; transition: all .15s; color: #999;
}
.feedback-btn:hover { border-color: #667eea; color: #667eea; }
.feedback-btn.voted { border-color: #667eea; background: #f0ecff; color: #667eea; pointer-events: none; }
.faq-tag { font-size: 10px; background: #e8f5e9; color: #27ae60; padding: 1px 6px; border-radius: 8px; }
.meta-text { font-size: 11px; color: #999; }

.suggestions {
    display: flex; gap: 8px; flex-wrap: wrap; padding: 4px 0 8px 46px;
    max-width: 800px; width: 100%; animation: fadeIn .3s ease;
}
.suggest-btn {
    background: white; border: 1px solid #e0e0e0; border-radius: 16px;
    padding: 6px 14px; font-size: 12px; color: #667eea; cursor: pointer;
    transition: all .15s; box-shadow: 0 1px 2px rgba(0,0,0,.04);
}
.suggest-btn:hover { border-color: #667eea; background: #f8f7ff; }

.input-area {
    background: white; padding: 12px 16px; border-top: 1px solid #e8e8e8;
    display: flex; gap: 10px; max-width: 800px; width: 100%; margin: 0 auto; flex-shrink: 0;
}
.input-area input {
    flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 16px;
    font-size: 14px; outline: none; transition: border-color .2s;
}
.input-area input:focus { border-color: #667eea; }
.input-area button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 20px; padding: 10px 24px;
    font-size: 14px; cursor: pointer; transition: opacity .2s;
}
.input-area button:hover { opacity: .9; }
.input-area button:disabled { opacity: .5; cursor: not-allowed; }

.typing { display: flex; gap: 4px; padding: 4px 0; }
.typing span {
    width: 6px; height: 6px; background: #999; border-radius: 50%;
    animation: bounce .6s infinite alternate;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }

.msg-time { font-size: 10px; color: #bbb; margin-top: 4px; }

.scroll-bottom {
    position: fixed; bottom: 80px; right: 20px; width: 36px; height: 36px;
    background: #667eea; color: white; border: none; border-radius: 50%;
    font-size: 16px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.2);
    display: none; z-index: 10; transition: opacity .2s;
}
.scroll-bottom:hover { opacity: .9; }

@media (max-width: 640px) {
    .message { max-width: 92%; }
    .suggestions { padding-left: 10px; }
    .suggest-btn { font-size: 11px; padding: 5px 10px; }
    .input-area { padding: 10px 12px; }
    .input-area input { padding: 8px 14px; font-size: 13px; }
    .input-area button { padding: 8px 18px; font-size: 13px; }
    .header h1 { font-size: 16px; }
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounce { to { transform: translateY(-6px); } }
</style>
</head>
<body>

<div class="header" style="position:relative">
    <h1>🎤 静享时空 · AI 客服</h1>
    <p>24小时在线，有什么可以帮到你？</p>
    <a href="/admin">管理后台 →</a>
</div>

<div class="chat-container" id="chatContainer">
    <div class="message assistant" id="greetingMsg">
        <div class="avatar">🎵</div>
        <div><div class="bubble" id="greetingText">正在加载...</div></div>
    </div>
</div>

<div id="suggestionsArea" class="suggestions">
    <button class="suggest-btn" onclick="sendQuick('大包厢晚上多少钱？')">💰 包厢价格</button>
    <button class="suggest-btn" onclick="sendQuick('怎么预约包厢？')">📱 怎么预约</button>
    <button class="suggest-btn" onclick="sendQuick('有什么会员优惠？')">🎁 会员福利</button>
    <button class="suggest-btn" onclick="sendQuick('第一次来，怎么使用？')">🆕 新手指南</button>
    <button class="suggest-btn" onclick="sendQuick('店在哪里？怎么去？')">📍 位置导航</button>
    <button class="suggest-btn" onclick="sendQuick('3个人适合什么包厢？')">👥 推荐房型</button>
</div>

<button class="scroll-bottom" id="scrollBtn" onclick="scrollToBottom()">↓</button>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button id="sendBtn" onclick="sendMsg()">发送</button>
</div>

<script>
const container = document.getElementById('chatContainer');
const suggestionsArea = document.getElementById('suggestionsArea');
const input = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
let sessionId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
let lastReply = '';

function addMessage(role, content, meta) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatar = role === 'user' ? '😊' : '🎵';
    const msgId = (meta && meta.message_id) ? meta.message_id : 0;

    let footerHtml = '';
    if (role === 'assistant' && meta) {
        const parts = [];
        if (meta.from_faq) parts.push('<span class="faq-tag">秒回</span>');
        else if (meta.elapsed_ms) parts.push(`<span class="meta-text">${meta.elapsed_ms}ms</span>`);
        if (meta.need_human) parts.push('<span class="meta-text" style="color:#e74c3c">⚠️ 已通知人工客服</span>');

        footerHtml = `<div class="msg-footer">
            <button class="feedback-btn" onclick="sendFeedback(this, 1, ${msgId})">👍</button>
            <button class="feedback-btn" onclick="sendFeedback(this, -1, ${msgId})">👎</button>
            ${parts.join('')}
        </div>`;
    }

    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

    div.innerHTML = `
        <div class="avatar">${avatar}</div>
        <div style="flex:1;min-width:0">
            <div class="bubble">${formatReply(content)}</div>
            ${footerHtml}
            <div class="msg-time">${timeStr}</div>
        </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

function formatReply(text) {
    // Simple markdown: **bold**, \n preserved via pre-wrap
    let html = escapeHtml(text);
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    return html;
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function escapeAttr(s) {
    return s.replace(/'/g, "\\'").replace(/\n/g, "\\n").slice(0, 100);
}

function updateSuggestions(suggestions) {
    if (!suggestions || suggestions.length === 0) {
        suggestionsArea.innerHTML = '';
        return;
    }
    suggestionsArea.innerHTML = suggestions.map(s =>
        `<button class="suggest-btn" onclick="sendQuick('${escapeAttr(s)}')">${escapeHtml(s)}</button>`
    ).join('');
}

function addTyping() {
    const div = document.createElement('div');
    div.className = 'message assistant'; div.id = 'typing';
    div.innerHTML = `<div class="avatar">🎵</div><div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function removeTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }

async function sendMsg() {
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    sendBtn.disabled = true;
    suggestionsArea.innerHTML = '';

    addMessage('user', msg);
    addTyping();

    try {
        const resp = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, session_id: sessionId }),
        });
        const data = await resp.json();
        removeTyping();
        lastReply = data.reply;
        addMessage('assistant', data.reply, {
            message_id: data.message_id,
            need_human: data.need_human,
            confidence: data.confidence,
            from_faq: data.from_faq,
            elapsed_ms: data.elapsed_ms,
        });
        updateSuggestions(data.suggestions);
    } catch (e) {
        removeTyping();
        addMessage('assistant', '网络出了点问题，请稍后再试 🙏');
    }
    sendBtn.disabled = false;
    input.focus();
}

function sendQuick(text) {
    input.value = text;
    sendMsg();
}

async function sendFeedback(btn, rating, messageId) {
    const row = btn.parentElement;
    row.querySelectorAll('.feedback-btn').forEach(b => b.classList.remove('voted'));
    btn.classList.add('voted');

    try {
        const resp = await fetch('/api/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                session_id: sessionId,
                message_id: messageId,
                rating: rating,
            }),
        });
        if (!resp.ok) {
            btn.title = '反馈失败';
        }
    } catch (e) {
        btn.title = '网络错误';
    }
}

// 滚动检测
const scrollBtn = document.getElementById('scrollBtn');
container.addEventListener('scroll', () => {
    const gap = container.scrollHeight - container.scrollTop - container.clientHeight;
    scrollBtn.style.display = gap > 200 ? 'block' : 'none';
});
function scrollToBottom() { container.scrollTop = container.scrollHeight; }

// 智能欢迎语
(async () => {
    try {
        const resp = await fetch('/api/greeting?session_id=' + encodeURIComponent(sessionId));
        const data = await resp.json();
        document.getElementById('greetingText').textContent = data.greeting;
    } catch (e) {
        document.getElementById('greetingText').textContent = '你好呀！我是静享时空的小助手「小享」~ 😊\n有什么想了解的随时问我！';
    }
})();

input.focus();
</script>
</body>
</html>
