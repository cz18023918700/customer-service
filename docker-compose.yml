version: "3.8"

services:
  customer-service:
    build: .
    container_name: jinxiang-cs
    restart: unless-stopped
    ports:
      - "8900:8900"
    volumes:
      - ./data:/app/data          # 持久化 DB + ChromaDB
      - ./.env:/app/.env:ro       # 配置文件
    environment:
      - PYTHONIOENCODING=utf-8
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8900/health',timeout=5); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
